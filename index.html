<!doctype html>
<html dir="rtl" lang="fa">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAMP GAMING</title>
<style>
@font-face {
  font-family:Vazirmatn;
  src:url('./fonts/Vazirmatn-Regular.woff2') format('woff2'),url('./fonts/Vazirmatn-Regular.ttf') format('truetype');
}
@font-face {
  font-family:Impact;
  src:url('./fonts/impact.woff') format('woff'),url('./fonts/impact.ttf') format('truetype');
}
* {
  box-sizing:border-box;
}
html,
body {
  min-height:100%;
  margin:0;
  background:#050505;
  color:#f2eadb;
  font-family:Vazirmatn;
}
body {
  overflow-x:hidden;
}
.container {
  min-height:100%;
  padding:18px 10px 40px;
  background-color:#050505;
  background-image:linear-gradient(0deg,transparent 24%,rgba(169,132,72,.09) 25%,rgba(169,132,72,.09) 26%,transparent 27%,transparent 74%,rgba(169,132,72,.09) 75%,rgba(169,132,72,.09) 76%,transparent 77%),linear-gradient(90deg,transparent 24%,rgba(169,132,72,.09) 25%,rgba(169,132,72,.09) 26%,transparent 27%,transparent 74%,rgba(169,132,72,.09) 75%,rgba(169,132,72,.09) 76%,transparent 77%);
  background-size:55px 55px;
}
.wrap {
  max-width:980px;
  margin:auto;
}
.hero {
  position:relative;
  height:325px;
  overflow:hidden;
  border:1px solid #a88249;
  border-bottom:4px solid #d0a45e;
  box-shadow:0 0 16px rgba(205,163,91,.2);
  text-align:center;
}
.hero img {
  position:absolute;
  top:0;
  right:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero:after {
  content:"";
  position:absolute;
  top:0;
  right:0;
  bottom:0;
  left:0;
  background:linear-gradient(90deg,rgba(0,0,0,.1),rgba(0,0,0,.4) 25%,rgba(0,0,0,.76) 50%,rgba(0,0,0,.4) 75%,rgba(0,0,0,.1));
}
.hero span,
.hero h1 {
  position:relative;
  z-index:1;
  display:block;
  margin:0;
  direction:ltr;
}
.hero span:first-of-type {
  position:absolute;
  top:48px;
  right:0;
  left:0;
  z-index:1;
  padding-top:0;
  color:rgba(225,190,110,.45);
  font-family:Impact;
  font-size:160px;
  letter-spacing:10px;
  line-height:.72;
  -webkit-text-fill-color:transparent;
  -webkit-text-stroke:2.5px rgba(225,190,110,.65);
}
.hero h1 {
  position:absolute;
  top:124px;
  right:0;
  left:0;
  z-index:2;
  color:#f0c86d;
  font-family:Impact;
  font-size:86px;
  font-weight:500;
  letter-spacing:4px;
  line-height:1;
  text-shadow:0 2px 1px #563a10,0 0 12px rgba(235,184,75,.34);
}
.hero span:last-of-type {
  position:absolute;
  top:237px;
  right:0;
  left:0;
  z-index:3;
  margin-top:0;
  color:#f7efe1;
  font-family:Impact;
  font-size:24px;
  font-weight:500;
  letter-spacing:5px;
}
.hero span:last-of-type:before,
.hero span:last-of-type:after {
  content:"";
  display:inline-block;
  width:74px;
  height:1px;
  margin:0 14px 5px;
  background:#c79b52;
}
.adBanner {
  position:relative;
  height:162px;
  margin-top:17px;
  overflow:hidden;
  border:1px solid #8d7044;
  border-bottom:3px solid #d0a45e;
  background:#070707 repeating-linear-gradient(135deg,rgba(216,174,100,.055) 0,rgba(216,174,100,.055) 12px,transparent 12px,transparent 26px);
  box-shadow:inset 0 0 45px #000,0 5px 16px #000;
  text-align:center;
}
.adBanner:before {
  content:"";
  position:absolute;
  top:50%;
  right:24px;
  left:24px;
  height:1px;
  background:#7e6238;
}
.adBanner span {
  position:relative;
  z-index:1;
  display:inline-block;
  margin-top:55px;
  padding:9px 28px;
  background:#070707;
  border-right:2px solid #d0a45e;
  border-left:2px solid #d0a45e;
  color:#e4bd73;
  font-size:20px;
  font-weight:bold;
}
.panel {
  position:relative;
  margin-top:17px;
  padding:17px;
  border:1px solid #8d7044;
  background:#070707;
  box-shadow:inset 0 0 0 1px rgba(239,205,143,.04),0 5px 16px #000;
}
.panel:before {
  content:"";
  position:absolute;
  top:-1px;
  left:-1px;
  border-top:18px solid #e8c079;
  border-right:18px solid transparent;
}
h2 {
  margin:0 0 16px;
  color:#eee7dc;
  font-size:18px;
}
h2 b {
  display:inline-block;
  margin-left:7px;
  padding-left:9px;
  border-left:1px solid #705d3c;
  color:#d7ad64;
  font-family:Impact;
  font-size:15px;
  font-weight:normal;
}
.tableBox {
  overflow-x:auto;
  border:1px solid #5f4b31;
}
table {
  width:100%;
  min-width:610px;
  border-collapse:collapse;
  background:#020202;
}
th,
td {
  padding:10px;
  border-bottom:1px solid #211d17;
  text-align:center;
}
th {
  border-bottom:2px solid #8c6c38;
  background:#080808;
  color:#d9b16b;
  font-size:12px;
}
.ip {
  color:#e5c280;
  font-family:Vazirmatn;
  font-weight:bold;
}
.server {
  font-family:Impact;
  font-weight:500;
  letter-spacing:.5px;
}
.copy,
.copy {
  min-width:66px;
  padding:7px 11px;
  border:1px solid #c79d5a;
  background:#efd7a8;
  color:#171109;
  font-family:Vazirmatn;
}
@media(max-width:650px) {
  .container {
    padding:8px 5px 25px;
  }
  .hero {
    height:235px;
  }
  .hero span:first-of-type {
    top:70px;
    padding-top:0;
    font-size:72px;
    letter-spacing:5px;
  }
  .hero h1 {
    top:110px;
    font-size:48px;
    letter-spacing:2px;
  }
  .hero span:last-of-type {
    top:165px;
    margin-top:0;
    font-size:15px;
    letter-spacing:3px;
  }
  .hero span:last-of-type:before,
  .hero span:last-of-type:after {
    width:28px;
    margin:0 7px 4px;
  }
  .adBanner {
    height:117px;
    margin-top:10px;
  }
  .adBanner span {
    margin-top:36px;
    padding:7px 18px;
    font-size:16px;
  }
  .panel {
    padding:13px;
  }
</style>
</head>
<body>
<div class="container">
<div class="wrap">
<div class="hero">
<img src="./hero.png" alt="Camp Gaming">
<span>WELCOME</span>
<h1>CAMP GAMING</h1>
<span>CS 1.6 SERVERS</span>
</div>
<div class="adBanner"><span>اینجا محل تبلیغات شماست</span></div>
<div id="app"></div>
</div>
</div>
<script>
var servers=[['Public Galaxy','5.57.34.87:27015'],['Public Normal','5.57.34.87:27016'],['Match Classic','5.57.34.87:27017'],['MIX / AIM / AWP','5.57.34.87:27018'],['Zombie Biohazard','5.57.34.87:27019']];
function e(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function copy(v,b){var t=document.createElement('textarea'),ok=false;t.value=v;t.style.position='absolute';t.style.left='-9999px';document.body.appendChild(t);t.select();try{ok=document.execCommand('copy');}catch(x){}document.body.removeChild(t);b.innerHTML=ok?'کپی شد':'کپی دستی';setTimeout(function(){b.innerHTML=b.getAttribute('data-label')||'کپی';},1200);}
function build(){var r='',i;for(i=0;i<servers.length;i++)r+='<tr><td>'+(i+1)+'</td><td class="server">'+e(servers[i][0])+'</td><td class="ip" dir="ltr">'+servers[i][1]+'</td><td><button class="copy" data-label="کپی" onclick="copy(\''+servers[i][1]+'\',this)">کپی</button></td></tr>';document.getElementById('app').innerHTML='<div class="panel servers"><h2><b>01</b> لیست سرورها</h2><div class="tableBox"><table><thead><tr><th>#</th><th>نام سرور</th><th>آدرس اتصال</th><th>عملیات</th></tr></thead><tbody>'+r+'</tbody></table></div></div>';}
build();
</script>
</body>
</html>
